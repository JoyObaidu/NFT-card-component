<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <title>preview card component</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-content">
              <div class="head">
                <div role="heading" class="image">
                    <img src="./images/image-equilibrium.jpg" alt="image-equilibrium">
                  </div>
                  <div class="overlay">
                      <img src="./images/icon-view.svg" alt="icon-view">
                  </div>
              </div>
                <div class="card-body">
                    <h2>Equilibrium #3429</h2>
                    <p>Our equilibrium collection promotes balance and calm.</p>
                    <div class="eutherum-time">
                        <h4><img src="./images/icon-ethereum.svg" alt=""> 0.041ETH</h4>
                        <p><img src="./images/icon-clock.svg" alt="">3 days left</p>
                    </div>
                    <hr>
                    <div class="authorization">
                        <img src="./images/image-avatar.png" alt="">
                        <p>Creation of <span>Jules Wyvern</span></p>
                    </div>
                </div>
            </div>
        </div>
</body>
</html>
